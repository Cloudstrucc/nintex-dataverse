<div class="container py-4">
<nav class="gc-breadcrumb" aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/">Home</a></li>
        <li class="breadcrumb-item active">Envelopes</li>
    </ol>
</nav>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-envelope me-2"></i>Envelopes</h2>
    <button class="btn btn-gc-primary" data-bs-toggle="modal" data-bs-target="#newEnvelopeModal">
        <i class="bi bi-plus-circle me-1"></i>New Envelope
    </button>
</div>

<!-- Filter Bar -->
<div class="gc-card card mb-4">
    <div class="card-body py-2">
        <div class="row g-2 align-items-center">
            <div class="col-md-4">
                <input type="text" id="searchEnvelopes" class="form-control form-control-sm" placeholder="Search envelopes..."/>
            </div>
            <div class="col-md-3">
                <select id="filterStatus" class="form-select form-select-sm">
                    <option value="">All Statuses</option>
                    <option value="Draft">Draft</option>
                    <option value="ReadyToSend">Ready to Send</option>
                    <option value="Sent">Sent</option>
                    <option value="Signed">Signed</option>
                    <option value="Cancelled">Cancelled</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-sm btn-outline-secondary w-100" onclick="loadEnvelopes()">
                    <i class="bi bi-arrow-clockwise me-1"></i>Refresh
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Envelopes Table -->
<div class="gc-card card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-gc table-hover mb-0">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Signers</th>
                        <th>Documents</th>
                        <th>Created</th>
                        <th>Modified</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody id="envelopes-body">
                    <tr>
                        <td colspan="7" class="text-center py-4">
                            <div class="spinner-border spinner-border-sm text-muted" role="status"></div>
                            <span class="text-muted ms-2">Loading envelopes...</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- New Envelope Modal -->
<div class="modal fade" id="newEnvelopeModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background: var(--gc-blue); color: white;">
                <h5 class="modal-title"><i class="bi bi-send me-2"></i>Create New Envelope</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="newEnvelopeForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Envelope Name</label>
                        <input type="text" id="envName" class="form-control" required placeholder="e.g. Contract - John Smith"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Template (optional)</label>
                        <select id="envTemplate" class="form-select">
                            <option value="">No template - upload document</option>
                        </select>
                    </div>
                    <div class="mb-3" id="uploadSection">
                        <label class="form-label fw-bold">Upload Document</label>
                        <input type="file" id="envDocument" class="form-control" accept=".docx,.doc,.pdf"/>
                        <div class="form-text">Supported formats: .docx, .doc, .pdf</div>
                    </div>

                    <hr/>
                    <h6><i class="bi bi-people me-1"></i>Signers</h6>
                    <div id="signersList" class="mb-3"></div>
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addSignerRow()">
                        <i class="bi bi-plus me-1"></i>Add Signer
                    </button>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-gc-primary" onclick="createEnvelope()">
                    <i class="bi bi-send me-1"></i>Create Envelope
                </button>
            </div>
        </div>
    </div>
</div>

<script>
var signerCount = 0;

function addSignerRow() {
    signerCount++;
    var html = '<div class="row g-2 mb-2 signer-row" id="signer-' + signerCount + '">' +
        '<div class="col-md-4"><input type="text" class="form-control form-control-sm signer-name" placeholder="Full Name" required/></div>' +
        '<div class="col-md-4"><input type="email" class="form-control form-control-sm signer-email" placeholder="Email" required/></div>' +
        '<div class="col-md-2"><input type="number" class="form-control form-control-sm signer-order" placeholder="Order" value="' + signerCount + '" min="1"/></div>' +
        '<div class="col-md-2"><button type="button" class="btn btn-sm btn-outline-danger w-100" onclick="this.closest(\'.signer-row\').remove()"><i class="bi bi-trash"></i></button></div>' +
        '</div>';
    document.getElementById('signersList').innerHTML += html;
}

function createEnvelope() {
    var name = document.getElementById('envName').value;
    if (!name) { alert('Please enter an envelope name.'); return; }

    var signerRows = document.querySelectorAll('.signer-row');
    if (signerRows.length === 0) { alert('Please add at least one signer.'); return; }

    var envelope = {
        cs_name: name,
        cs_status: 'Draft'
    };

    // Create envelope via Dataverse Web API
    shell.ajaxSafePost({
        url: '/_api/cs_envelopes',
        contentType: 'application/json',
        data: JSON.stringify(envelope),
        success: function(data) {
            var modal = bootstrap.Modal.getInstance(document.getElementById('newEnvelopeModal'));
            modal.hide();
            loadEnvelopes();
            alert('Envelope created successfully!');
        },
        error: function(xhr) {
            alert('Error creating envelope: ' + (xhr.responseText || 'Unknown error'));
        }
    });
}

function loadEnvelopes() {
    var filter = '';
    var status = document.getElementById('filterStatus').value;
    var search = document.getElementById('searchEnvelopes').value;

    var url = '/_api/cs_envelopes?$orderby=createdon desc&$top=50';
    if (status) url += "&$filter=cs_status eq '" + status + "'";

    shell.ajaxSafeGet({
        url: url,
        success: function(data) {
            var tbody = document.getElementById('envelopes-body');
            if (!data || !data.value || data.value.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">' +
                    '<i class="bi bi-inbox" style="font-size: 2rem;"></i>' +
                    '<p class="mb-0 mt-2">No envelopes found.</p></td></tr>';
                return;
            }
            tbody.innerHTML = '';
            data.value.forEach(function(env) {
                var statusClass = 'badge-draft';
                var status = env.cs_status || 'Draft';
                if (status === 'Signed') statusClass = 'badge-signed';
                else if (status === 'Sent') statusClass = 'badge-sent';
                else if (status === 'ReadyToSend') statusClass = 'badge-ready';
                else if (status === 'Cancelled') statusClass = 'badge-cancelled';

                var row = '<tr>' +
                    '<td><a href="/document-viewer/?id=' + env.cs_envelopeid + '">' + (env.cs_name || 'Untitled') + '</a></td>' +
                    '<td><span class="badge ' + statusClass + '">' + status + '</span></td>' +
                    '<td>--</td><td>--</td>' +
                    '<td>' + new Date(env.createdon).toLocaleDateString() + '</td>' +
                    '<td>' + new Date(env.modifiedon).toLocaleDateString() + '</td>' +
                    '<td class="text-end">' +
                    '<a href="/document-viewer/?id=' + env.cs_envelopeid + '" class="btn btn-sm btn-gc-primary me-1" title="View"><i class="bi bi-eye"></i></a>' +
                    '<button class="btn btn-sm btn-gc-danger" title="Cancel" onclick="cancelEnvelope(\'' + env.cs_envelopeid + '\')"><i class="bi bi-x-circle"></i></button>' +
                    '</td></tr>';
                tbody.innerHTML += row;
            });
        },
        error: function() {
            document.getElementById('envelopes-body').innerHTML =
                '<tr><td colspan="7" class="text-center text-danger py-4">Error loading envelopes.</td></tr>';
        }
    });
}

// Add first signer row and load envelopes on page load
document.addEventListener('DOMContentLoaded', function() {
    addSignerRow();
    loadEnvelopes();
});
</script>
</div>
