# ============================================================
# Power Pages configuration files needed for the Template Editor page.
# Copy each section into the appropriate file/folder in the site source.
# ============================================================


# ── 1. Web Template YAML ────────────────────────────────────
# File: web-templates/template-editor/TemplateEditor.webtemplate.yml
# (The .source.html goes next to it as TemplateEditor.webtemplate.source.html
#  — copy TemplateEditor.liquid contents into that file)

# adx_name: TemplateEditor
# adx_webtemplateid: <generate-new-guid>
#   e.g. b1c2d3e4-f5a6-7890-abcd-ef1234567890


# ── 2. Page Template YAML ───────────────────────────────────
# File: page-templates/TemplateEditor.pagetemplate.yml

# adx_description: Template Editor page - PDF canvas with drag-and-drop field placement
# adx_entityname: adx_webpage
# adx_isdefault: false
# adx_name: TemplateEditor
# adx_pagetemplateid: <generate-new-guid>
#   e.g. a2b3c4d5-e6f7-8901-abcd-ef2345678901
# adx_type: 756150001
# adx_usewebsiteheaderandfooter: true
# adx_webtemplateid: <same guid as web template above>


# ── 3. Web Page YAML (root) ────────────────────────────────
