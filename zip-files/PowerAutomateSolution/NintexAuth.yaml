swagger: '2.0'
info:
  title: Nintex Authenticate
  description: >-
    Custom connector for Nintex AssureSign authentication only.
    Calls account.assuresign.net to obtain a bearer token.
    Use the returned token in the Nintex AssureSign connector actions
    by passing: concat('bearer ', body('Authenticate')?['result']?['token'])
  version: 1.0.0
  contact:
    name: Elections Canada
    email: support@elections.ca
host: account.assuresign.net
basePath: /api/v3.7
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
paths:
  /authentication/apiUser:
    post:
      summary: Authenticate
      description: >-
        Obtain a bearer token for Nintex AssureSign API calls.
        Returns a JWT token valid for the specified session length.
        Store the result using:
        concat('bearer ', body('Authenticate')?['result']?['token'])
      operationId: Authenticate
      x-ms-visibility: important
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - request
            properties:
              request:
                type: object
                required:
                  - apiUsername
                  - key
                  - contextUsername
                properties:
                  apiUsername:
                    type: string
                    description: Your Nintex AssureSign API username
                    x-ms-summary: API Username
                    default: elections-broker-service_apdFUAke
                    x-ms-visibility: important
                  key:
                    type: string
                    description: Your Nintex AssureSign API key
                    x-ms-summary: API Key
                    x-ms-visibility: important
                  contextUsername:
                    type: string
                    description: Email address of the AssureSign account user
                    x-ms-summary: Context Email
                    default: fred.pearson@leonardocompany.ca
                    x-ms-visibility: important
                  sessionLengthInMinutes:
                    type: integer
                    description: >-
                      Session token validity in minutes. Use 1440 for 24 hours
                      to minimize re-authentication frequency.
                    x-ms-summary: Session Length (Minutes)
                    default: 1440
                    x-ms-visibility: advanced
      responses:
        '200':
          description: Authentication successful
          schema:
            type: object
            properties:
              messages:
                type: array
                description: Any messages returned by the API
                items:
                  type: string
              result:
                type: object
                properties:
                  token:
                    type: string
                    description: >-
                      Bearer token for subsequent AssureSign API calls.
                      Use in Authorization header as: bearer {token}
                    x-ms-summary: Bearer Token
        '401':
          description: Authentication failed - invalid credentials
        '403':
          description: Forbidden - check API username and key
definitions: {}
parameters: {}
responses: {}
tags: []